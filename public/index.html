<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazing Houseplants</title>
    <!-- PicoCSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <nav class="container-fluid top-nav">
        <ul>
            <li><strong><a href="/" class="contrast">🌿 Amazing Houseplants</a></strong></li>
        </ul>
        <ul>
            <li><a href="#" class="secondary">About</a></li>
            <li><a href="#" role="button" class="outline">Discover</a></li>
        </ul>
    </nav>

    <main class="container">
        <header class="hero">
            <hgroup>
                <h1>Bring Nature Indoors</h1>
                <p>Discover the most resilient, beautiful, and amazing houseplants to elevate your living space.</p>
            </hgroup>
        </header>

        <section class="search-container">
            <input type="search" id="search-input" placeholder="Search plants by name, scientific name, or difficulty..." />
        </section>

        <section id="plants-grid" class="grid plants-container">
            <div aria-busy="true" class="loading-state">Loading amazing plants...</div>
        </section>
    </main>

    <footer class="container-fluid">
        <small>© 2026 Amazing Houseplants Inc. Built with PicoCSS.</small>
    </footer>

    <script src="/scripts.js"></script>

</html>
